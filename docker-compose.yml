version: '3.9'

services:
    api:
        build:
            context: .
            dockerfile: Dockerfile
        image: smart-go-api:local
        container_name: smart-go-api
        restart: unless-stopped
        env_file:
            - .env
        ports:
            - '8000:8000'
        depends_on:
            - mongo

    mongo:
        image: mongo:7
        container_name: smart-go-mongo
        restart: unless-stopped
        ports:
            - '27017:27017'
        volumes:
            - mongo_data:/data/db

volumes:
    mongo_data:
