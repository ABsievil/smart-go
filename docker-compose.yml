services:
    api:
        build:
            context: .
            dockerfile: Dockerfile
        image: smart-go-api:local
        container_name: smart-go-api
        restart: unless-stopped
        init: true
        stop_grace_period: 30s
        env_file:
            - .env
        environment:
            NODE_ENV: production
            APP_HOST: 0.0.0.0
            APP_PORT: ${APP_PORT:-8000}
        ports:
            - '${APP_PORT:-8000}:${APP_PORT:-8000}'
        depends_on:
            - mongo
            - redis

    mongo:
        image: mongo:7
        container_name: smart-go-mongo
        restart: unless-stopped
        environment:
            MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:-smartgo}
            MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-changeme}
        volumes:
            - mongo_data:/data/db

    redis:
        image: redis:7-alpine
        container_name: smart-go-redis
        restart: unless-stopped
        command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
        volumes:
            - redis_data:/data

volumes:
    mongo_data:
    redis_data:
