name: Deploy VPS (SSH)

on:
    push:
        branches: [main, master]
    workflow_dispatch:
        inputs:
            no_cache:
                description: 'docker compose build --no-cache'
                type: boolean
                default: false

concurrency:
    group: deploy-vps-${{ github.ref }}
    cancel-in-progress: true

jobs:
    deploy:
        runs-on: ubuntu-latest
        env:
            DEPLOY_PATH: ${{ vars.VPS_DEPLOY_PATH }}
            DEPLOY_BRANCH: ${{ vars.VPS_DEPLOY_BRANCH || 'main' }}
            BUILD_NO_CACHE: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.no_cache == true) && '1' || '0' }}

        steps:
            - name: Deploy over SSH
              uses: appleboy/ssh-action@v1.2.1
              with:
                  host: ${{ secrets.VPS_HOST }}
                  username: ${{ secrets.VPS_USER }}
                  key: ${{ secrets.VPS_SSH_KEY }}
                  port: ${{ vars.VPS_SSH_PORT || 22 }}
                  envs: DEPLOY_PATH,DEPLOY_BRANCH,BUILD_NO_CACHE
                  script: |
                      set -e
                      if [ -z "$DEPLOY_PATH" ]; then
                        echo "Missing VPS_DEPLOY_PATH repository variable"
                        exit 1
                      fi
                      cd "$DEPLOY_PATH"
                      bash scripts/deploy.sh
